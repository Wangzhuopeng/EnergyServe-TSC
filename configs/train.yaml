# configs/train.yaml

# 1. Base Model Configuration
model:
  base_model: "google/gemma-2b-it"
  max_length: 2048

# 2. Dataset-Specific Paths
datasets:
  lmsys:
    train_path: "./data/lmsys-chat-1m/lmsys_train.jsonl"
    output_dir: "./checkpoints/lmsys_lora"
  alpaca:
    train_path: "./data/alpaca/alpaca_train.jsonl"
    output_dir: "./checkpoints/alpaca_lora"
  dolly:
    train_path: "./data/databricks-dolly-15k/dolly_natural_train.jsonl"
    output_dir: "./checkpoints/dolly_lora"

# 3. Training Hyperparameters
training:
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  num_train_epochs: 3
  learning_rate: 2.0e-5
  bf16: true
  logging_steps: 10
  save_steps: 500
  save_total_limit: 10
  deepspeed_config: "./configs/ds_zero2_no_offload.json" # Your DeepSpeed config

# 4. LoRA Configuration
lora:
  r: 128
  alpha: 256
  dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]